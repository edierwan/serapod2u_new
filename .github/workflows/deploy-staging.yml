# Build the Next.js app image OFF the VPS (here on GitHub runners), push it to
# GHCR, then tell Coolify to PULL the prebuilt image instead of building on-box.
#
# Why: the VPS only has ~7.8GB RAM shared by prod+stg Supabase stacks, Coolify,
# mail and portals. An on-box `next build` fills swap and takes the whole box
# (prod included) down via resource starvation. Building here removes that risk.
#
# ── ONE-TIME SETUP (required before this works) ───────────────────────────────
# 1. GitHub repo → Settings → Secrets and variables → Actions → add:
#      STAGING_NEXT_PUBLIC_SUPABASE_URL        (staging Supabase URL)
#      STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY   (staging anon key)
#      STAGING_NEXT_PUBLIC_APP_URL             (staging public app URL)
#      STAGING_SUPABASE_SERVICE_ROLE_KEY       (staging service role key)
#      STAGING_CRON_SECRET                     (staging cron secret)
#      COOLIFY_URL                             (e.g. https://coolify.getouch.cloud)
#      COOLIFY_API_TOKEN                       (Coolify → Keys & Tokens → API token)
#      COOLIFY_STAGING_UUID                    (ao0gw084g0skgoo0ko4wwsco)
#    Copy the *_NEXT_PUBLIC_* / service-role / cron values from the current
#    Coolify staging app's Environment Variables so the bundle matches today.
#
# 2. In Coolify, keep the staging resource (uuid ao0gw084g0skgoo0ko4wwsco) on its
#    git source with the Coolify deploy WEBHOOK enabled. Coolify's own webhook is
#    the single deployment trigger for staging — this workflow only builds and
#    publishes the prebuilt image to GHCR so Coolify has an up-to-date image to
#    pull. Do NOT re-add an API deploy call here (see note below).
#
# 3. Add GHCR pull credentials in Coolify (the repo/package is private):
#      Coolify → Sources/Registries → add a Docker registry
#        Registry: ghcr.io
#        Username: edierwan
#        Password: a GitHub PAT with `read:packages`
#
# NOTE (2026-07-07): the old `trigger-coolify` job that called the Coolify API
# (`GET /api/v1/deploy?uuid=…&force=true`) was REMOVED. When Coolify's git webhook
# auto-deploy is also enabled, a single push to `staging` fired TWO deployments
# (Coolify webhook + this API call). Deployment is now handled solely by the
# Coolify webhook. If a future setup turns the webhook OFF and relies on GHCR
# image pulls only, re-introduce a single deploy trigger — never both at once.
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy Staging (image → GHCR → Coolify pull)

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: edierwan/serapod2u_new

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.STAGING_NEXT_PUBLIC_APP_URL }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
            CRON_SECRET=${{ secrets.STAGING_CRON_SECRET }}

  # NOTE: the `trigger-coolify` job (Coolify API `GET /api/v1/deploy`) was removed
  # on 2026-07-07 to stop duplicate staging deployments. Coolify's own git webhook
  # is now the single deployment trigger. Do not re-add an API deploy call unless
  # the webhook is disabled.
